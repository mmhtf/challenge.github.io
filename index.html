<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日挑战 · Daily Challenge</title>
<style>
  :root{
    --bg:#0f1020;--bg2:#171933;
    --card:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.12);
    --text:#f5f6ff;--muted:#9aa0c4;
    --accent:#7c5cff;--accent2:#ff7ac6;--gold:#ffd166;--green:#3ddc97;--danger:#ff6b6b;
    --shadow:0 18px 50px rgba(0,0,0,0.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,0.25), transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, rgba(255,122,198,0.22), transparent 55%),
      linear-gradient(160deg, var(--bg), var(--bg2));
    background-attachment:fixed;min-height:100vh;line-height:1.5;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px}

  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 24px rgba(124,92,255,0.5)}
  .brand h1{font-size:22px;letter-spacing:.5px}
  .brand p{color:var(--muted);font-size:13px}
  .head-right{display:flex;align-items:center;gap:12px}
  .streak-badge{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--card-border);padding:10px 16px;border-radius:16px;backdrop-filter:blur(10px)}
  .streak-badge .num{font-size:26px;font-weight:800;color:var(--gold)}
  .streak-badge .lbl{font-size:12px;color:var(--muted);line-height:1.2}
  .gear{width:46px;height:46px;border-radius:14px;background:var(--card);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:.2s}
  .gear:hover{transform:rotate(40deg);border-color:var(--accent)}

  .clock-line{color:var(--muted);font-size:13px;margin:4px 0 0 2px}
  .clock-line b{color:var(--text);font-variant-numeric:tabular-nums}

  .quote{margin:16px 0 24px;padding:18px 22px;border-radius:18px;background:linear-gradient(120deg,rgba(124,92,255,0.18),rgba(255,122,198,0.14));border:1px solid var(--card-border);display:flex;align-items:center;gap:14px;font-size:16px}
  .quote .mark{font-size:34px;color:var(--accent2);line-height:0;opacity:.8}
  .quote em{font-style:normal;color:#fff}

  .grid{display:grid;grid-template-columns:1.25fr 1fr;gap:20px}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--card-border);border-radius:20px;padding:22px;backdrop-filter:blur(12px);box-shadow:var(--shadow)}
  .card h2{font-size:15px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}

  .countdown-card{text-align:center;position:relative;overflow:hidden}
  .cd-label{color:var(--muted);font-size:13px;margin-bottom:6px}
  .cd-timer{display:flex;justify-content:center;gap:12px;margin:8px 0 6px}
  .cd-unit{background:rgba(0,0,0,0.25);border:1px solid var(--card-border);border-radius:14px;padding:14px 10px;min-width:74px}
  .cd-unit .v{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,#fff,#c9c4ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .cd-unit .u{font-size:11px;color:var(--muted);letter-spacing:1px}
  .cd-sub{color:var(--muted);font-size:13px}
  .progress{height:10px;background:rgba(0,0,0,0.3);border-radius:99px;overflow:hidden;margin-top:16px}
  .progress > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}

  .today-task{display:flex;flex-direction:column;gap:12px}
  .input-row{display:flex;gap:10px}
  input[type=text],select{width:100%;background:rgba(0,0,0,0.28);border:1px solid var(--card-border);color:var(--text);padding:13px 15px;border-radius:13px;font-size:15px;font-family:inherit;outline:none}
  input::placeholder{color:#7a7fa6}
  input:focus,select:focus{border-color:var(--accent)}
  select option{background:#1b1d38}
  button{cursor:pointer;border:none;font-family:inherit;font-weight:600;border-radius:13px;padding:13px 20px;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));transition:transform .12s, box-shadow .2s;white-space:nowrap}
  button:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(124,92,255,0.45)}
  button:active{transform:translateY(0)}
  button.ghost{background:transparent;border:1px solid var(--card-border);color:var(--muted)}
  button.ghost:hover{box-shadow:none;color:#fff;border-color:var(--accent)}
  button.sm{padding:8px 14px;font-size:13px;border-radius:10px}

  .task-item{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:14px;background:rgba(0,0,0,0.22);border:1px solid var(--card-border)}
  .task-item.done{opacity:.65}
  .task-item.done .t-title{text-decoration:line-through;color:var(--muted)}
  .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:2px}
  .check.on{background:var(--green);border-color:var(--green)}
  .check.on::after{content:"✓";color:#06281d;font-weight:900;font-size:15px}
  .t-body{flex:1;min-width:0}
  .t-title{font-size:16px;font-weight:600;word-break:break-word}
  .t-del{background:none;color:var(--muted);padding:4px 8px;font-size:18px;line-height:1}
  .t-del:hover{color:var(--danger);transform:none;box-shadow:none}
  .empty{color:var(--muted);text-align:center;padding:24px 10px;font-size:14px}

  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-head .mtitle{font-size:17px;font-weight:700}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{padding:6px 12px;background:rgba(0,0,0,0.25);border:1px solid var(--card-border)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-grid .dow{text-align:center;color:var(--muted);font-size:12px;padding:4px 0}
  .day{aspect-ratio:1/1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;font-size:14px;background:rgba(255,255,255,0.03);border:1px solid transparent;cursor:default}
  .day.blank{background:transparent}
  .day.has{cursor:pointer}
  .day.today{border-color:var(--accent)}
  .day.all-done{background:linear-gradient(135deg,rgba(61,220,151,0.35),rgba(61,220,151,0.12));border-color:rgba(61,220,151,0.5)}
  .day.partial{background:linear-gradient(135deg,rgba(255,209,102,0.28),rgba(255,209,102,0.08));border-color:rgba(255,209,102,0.4)}
  .day .dot{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:var(--accent2)}
  .day:hover.has{transform:scale(1.06);transition:.12s}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px}
  .stat{background:rgba(0,0,0,0.22);border:1px solid var(--card-border);border-radius:14px;padding:14px;text-align:center}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-top:2px}
  .stat.s1 .n{color:var(--gold)}.stat.s2 .n{color:var(--green)}.stat.s3 .n{color:var(--accent2)}

  .history-list{display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto;padding-right:6px}
  .history-list::-webkit-scrollbar{width:8px}
  .history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:8px}
  .hday{background:rgba(0,0,0,0.22);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px}
  .hday-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .hday-date{font-weight:700;font-size:15px}
  .hday-tag{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
  .hday-tag.full{background:rgba(61,220,151,0.18);color:var(--green)}
  .hday-tag.some{background:rgba(255,209,102,0.18);color:var(--gold)}
  .hday-tag.none{background:rgba(255,107,107,0.16);color:var(--danger)}
  .htask{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);padding:2px 0}
  .htask.ok{color:var(--text)}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin:30px 0 14px}
  .section-title h2{font-size:18px;letter-spacing:.5px;color:var(--text)}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:40px}

  .toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(40px);background:linear-gradient(135deg,var(--accent),var(--accent2));padding:14px 26px;border-radius:30px;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:.35s;pointer-events:none;z-index:50;font-size:15px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:40}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(8,8,20,0.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:.25s;padding:20px}
  .overlay.show{opacity:1;pointer-events:auto}
  .modal{background:linear-gradient(160deg,#1d1f3d,#171933);border:1px solid var(--card-border);border-radius:22px;padding:28px;max-width:420px;width:100%;box-shadow:var(--shadow);transform:translateY(20px) scale(.96);transition:.25s}
  .overlay.show .modal{transform:translateY(0) scale(1)}
  .modal h3{font-size:19px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;background:rgba(0,0,0,0.28);border:1px solid var(--card-border);color:var(--muted);font-weight:600}
  .seg button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}

  /* motivation popup */
  .mot-modal{text-align:center;max-width:440px}
  .mot-emoji{font-size:60px;margin-bottom:10px;animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  .mot-text{font-size:21px;font-weight:700;line-height:1.45;margin-bottom:6px}
  .mot-sub{color:var(--muted);font-size:14px;margin-bottom:22px}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="logo">🔥</div>
      <div>
        <h1 data-i18n="title">每日挑战</h1>
        <p data-i18n="subtitle">每天进步一点点，成就不一样的自己</p>
        <div class="clock-line" id="clockLine"></div>
      </div>
    </div>
    <div class="head-right">
      <div class="streak-badge">
        <span class="num" id="streakNum">0</span>
        <span class="lbl" id="streakLbl"></span>
      </div>
      <div class="gear" id="gearBtn" title="设置 / Settings">⚙️</div>
    </div>
  </header>

  <div class="quote">
    <span class="mark">❝</span>
    <em id="quoteText">…</em>
  </div>

  <div class="grid">
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="card countdown-card">
        <div class="cd-label" data-i18n="cdLabel">距离今日结束还有</div>
        <div class="cd-timer">
          <div class="cd-unit"><div class="v" id="cdH">00</div><div class="u" data-i18n="uH">时</div></div>
          <div class="cd-unit"><div class="v" id="cdM">00</div><div class="u" data-i18n="uM">分</div></div>
          <div class="cd-unit"><div class="v" id="cdS">00</div><div class="u" data-i18n="uS">秒</div></div>
        </div>
        <div class="cd-sub" id="cdSub"></div>
        <div class="progress"><i id="dayProg" style="width:0%"></i></div>
      </div>

      <div class="card">
        <h2 data-i18n="todayTitle">🎯 今日挑战</h2>
        <div class="today-task">
          <div class="input-row">
            <input type="text" id="taskInput" maxlength="80">
            <button id="addBtn" data-i18n="addBtn">添加</button>
          </div>
          <div id="taskList"></div>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="card">
        <div class="cal-head">
          <div class="mtitle" id="calTitle"></div>
          <div class="cal-nav">
            <button id="prevMon">‹</button>
            <button id="todayBtn" class="sm" data-i18n="todayBtn">今天</button>
            <button id="nextMon">›</button>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div class="card">
        <h2 data-i18n="statsTitle">📊 数据统计</h2>
        <div class="stats">
          <div class="stat s1"><div class="n" id="stStreak">0</div><div class="l" data-i18n="stStreak">当前连击</div></div>
          <div class="stat s2"><div class="n" id="stDays">0</div><div class="l" data-i18n="stDays">打卡天数</div></div>
          <div class="stat s3"><div class="n" id="stTasks">0</div><div class="l" data-i18n="stTasks">完成任务</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">
    <h2 data-i18n="historyTitle">🗂️ 挑战历史</h2>
    <button class="ghost sm" id="clearBtn" data-i18n="clearBtn">清空全部数据</button>
  </div>
  <div class="card">
    <div class="history-list" id="historyList"></div>
  </div>

  <footer data-i18n="footer">数据保存在你的浏览器本地 · 不会上传 · 坚持就是胜利 💪</footer>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h3>⚙️ <span data-i18n="settings">设置</span></h3>
    <div class="field">
      <label data-i18n="langLabel">语言 Language</label>
      <div class="seg" id="langSeg">
        <button data-lang="zh">中文</button>
        <button data-lang="en">English</button>
      </div>
    </div>
    <div class="field">
      <label data-i18n="tzLabel">时区 / 当地时间</label>
      <select id="tzSelect"></select>
    </div>
    <div class="modal-actions">
      <button class="ghost sm" id="settingsClose" data-i18n="close">关闭</button>
    </div>
  </div>
</div>

<!-- Motivation popup -->
<div class="overlay" id="motOverlay">
  <div class="modal mot-modal">
    <div class="mot-emoji" id="motEmoji">💪</div>
    <div class="mot-text" id="motText"></div>
    <div class="mot-sub" id="motSub"></div>
    <button id="motGo" data-i18n="motGo">开始挑战！</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ i18n ============ */

const MOTIVATIONS = {
  zh:[["🔥","说到做到，你已经赢了一半！"],["💪","行动起来的人，运气都不会太差。"],["🚀","目标已锁定，向前冲！"],["🌟","每一个挑战，都是更好的自己。"],["⚡","别想太多，干就完事了！"],["🏆","今天的坚持，明天的勋章。"],["🌱","小小的一步，也是成长。"],["✨","你比自己想象的更强大。"]],
  en:[["🔥","You committed — you're already halfway there!"],["💪","People who take action make their own luck."],["🚀","Target locked. Go for it!"],["🌟","Every challenge builds a better you."],["⚡","Don't overthink it — just do it!"],["🏆","Today's grit, tomorrow's glory."],["🌱","Even a small step is growth."],["✨","You're stronger than you think."]]
};

const TIMEZONES = [
  ["auto","__auto__"],
  ["Pacific/Honolulu","Honolulu (UTC-10)"],
  ["America/Los_Angeles","Los Angeles (UTC-8)"],
  ["America/Denver","Denver (UTC-7)"],
  ["America/Chicago","Chicago (UTC-6)"],
  ["America/New_York","New York (UTC-5)"],
  ["America/Sao_Paulo","São Paulo (UTC-3)"],
  ["Europe/London","London (UTC+0)"],
  ["Europe/Paris","Paris / Berlin (UTC+1)"],
  ["Europe/Moscow","Moscow (UTC+3)"],
  ["Asia/Dubai","Dubai (UTC+4)"],
  ["Asia/Kolkata","India (UTC+5:30)"],
  ["Asia/Bangkok","Bangkok (UTC+7)"],
  ["Asia/Shanghai","北京/上海 (UTC+8)"],
  ["Asia/Tokyo","Tokyo / Seoul (UTC+9)"],
  ["Australia/Sydney","Sydney (UTC+10/11)"],
  ["Pacific/Auckland","Auckland (UTC+12/13)"]
];

/* ============ state ============ */
const KEY = "dailyChallengeData_v1";
const SKEY = "dailyChallengeSettings_v1";
let data = loadData();
let settings = loadSettings();
let L = I18N[settings.lang];
let calDate = new Date();

function loadData(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return {}; } }
function saveData(){ localStorage.setItem(KEY, JSON.stringify(data)); }
function loadSettings(){ try{ return Object.assign({lang:"zh",tz:"auto"}, JSON.parse(localStorage.getItem(SKEY))||{}); }catch(e){ return {lang:"zh",tz:"auto"}; } }
function saveSettings(){ localStorage.setItem(SKEY, JSON.stringify(settings)); }

/* ============ timezone-aware "now" ============ */
function nowParts(){
  const opts = {hour12:false,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"};
  if(settings.tz!=="auto") opts.timeZone = settings.tz;
  const fmt = new Intl.DateTimeFormat("en-CA",opts);
  const p = {};
  fmt.formatToParts(new Date()).forEach(x=>{ if(x.type!=="literal") p[x.type]=x.value; });
  let h = parseInt(p.hour,10); if(h===24) h=0;        // some engines emit 24 at midnight
  return {year:+p.year,month:+p.month,day:+p.day,hour:h,minute:+p.minute,second:+p.second};
}
function todayKey(){
  const p = nowParts();
  return p.year+"-"+String(p.month).padStart(2,"0")+"-"+String(p.day).padStart(2,"0");
}

/* ============ apply language ============ */
function applyLang(){
  L = I18N[settings.lang];
  document.documentElement.lang = settings.lang==="zh"?"zh-CN":"en";
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v = L[el.dataset.i18n];
    if(typeof v==="string") el.innerHTML = v;
  });
  document.getElementById("taskInput").placeholder = L.taskPlaceholder;
  document.getElementById("streakLbl").innerHTML = L.streakLbl;
  setQuote();
  renderTasks();
}

/* ============ quote ============ */
function setQuote(){
  const p = nowParts();
  const arr = QUOTES[settings.lang];
  document.getElementById("quoteText").textContent = arr[(p.day+p.month)%arr.length];
}

/* ============ today tasks ============ */
function getToday(){ const k=todayKey(); if(!data[k]) data[k]=[]; return data[k]; }

function renderTasks(){
  const list = document.getElementById("taskList");
  const tasks = getToday();
  list.innerHTML="";
  if(tasks.length===0){ list.innerHTML='<div class="empty">'+L.emptyTasks+'</div>'; }
  tasks.forEach(t=>{
    const el=document.createElement("div");
    el.className="task-item"+(t.done?" done":"");
    el.innerHTML=`<div class="check ${t.done?'on':''}" data-id="${t.id}"></div>
      <div class="t-body"><div class="t-title"></div></div>
      <button class="t-del" data-del="${t.id}">×</button>`;
    el.querySelector(".t-title").textContent=t.title;
    list.appendChild(el);
  });
  list.querySelectorAll(".check").forEach(c=>c.onclick=()=>toggle(c.dataset.id));
  list.querySelectorAll(".t-del").forEach(b=>b.onclick=()=>delTask(b.dataset.del));
  refreshAll();
}

function addTask(){
  const inp=document.getElementById("taskInput");
  const v=inp.value.trim();
  if(!v) return;
  getToday().push({id:Date.now()+""+Math.floor(Math.random()*999),title:v,done:false});
  inp.value=""; saveData(); renderTasks();
  showMotivation();
}

function toggle(id){
  const t=getToday().find(x=>x.id===id); if(!t) return;
  t.done=!t.done; saveData(); renderTasks();
  if(t.done){
    const tasks=getToday();
    if(tasks.length && tasks.every(x=>x.done)){ toast(L.toastAllDone); confetti(); }
    else toast(L.toastDone);
  }
}
function delTask(id){
  const k=todayKey();
  data[k]=data[k].filter(x=>x.id!==id);
  if(data[k].length===0) delete data[k];
  saveData(); renderTasks();
}

/* ============ motivation popup ============ */
function showMotivation(){
  const arr=MOTIVATIONS[settings.lang];
  const [emoji,text]=arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("motEmoji").textContent=emoji;
  document.getElementById("motText").textContent=text;
  document.getElementById("motSub").textContent=L.motSub;
  document.getElementById("motOverlay").classList.add("show");
}

/* ============ countdown ============ */
function tickCountdown(){
  const p=nowParts();
  const elapsed=p.hour*3600+p.minute*60+p.second;
  const remain=Math.max(0,86400-elapsed);
  document.getElementById("cdH").textContent=String(Math.floor(remain/3600)).padStart(2,"0");
  document.getElementById("cdM").textContent=String(Math.floor(remain%3600/60)).padStart(2,"0");
  document.getElementById("cdS").textContent=String(remain%60).padStart(2,"0");
  document.getElementById("dayProg").style.width=(elapsed/86400*100).toFixed(1)+"%";
  const tasks=getToday();
  const sub=document.getElementById("cdSub");
  if(tasks.length && tasks.every(x=>x.done)) sub.textContent=L.doneAll;
  else if(remain<10800) sub.textContent=L.rush;
  else sub.textContent=L.seize;
  // live local clock
  document.getElementById("clockLine").innerHTML=
    "🕐 <b>"+String(p.hour).padStart(2,"0")+":"+String(p.minute).padStart(2,"0")+":"+String(p.second).padStart(2,"0")+"</b> · "+
    (settings.tz==="auto"?L.tzAuto:settings.tz);
}

/* ============ calendar ============ */
function dayStatus(key){
  const tasks=data[key];
  if(!tasks||tasks.length===0) return "none";
  if(tasks.every(t=>t.done)) return "all";
  if(tasks.some(t=>t.done)) return "partial";
  return "has";
}
function renderCalendar(){
  const grid=document.getElementById("calGrid");
  const y=calDate.getFullYear(),mo=calDate.getMonth();
  document.getElementById("calTitle").textContent=L.calTitle(y,mo);
  grid.innerHTML="";
  L.dow.forEach(d=>{const e=document.createElement("div");e.className="dow";e.textContent=d;grid.appendChild(e);});
  const first=new Date(y,mo,1).getDay();
  const days=new Date(y,mo+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement("div");e.className="day blank";grid.appendChild(e);}
  const tk=todayKey();
  for(let d=1;d<=days;d++){
    const key=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const st=dayStatus(key);
    const e=document.createElement("div"); e.className="day";
    if(key===tk) e.classList.add("today");
    if(st==="all") e.classList.add("all-done");
    else if(st==="partial"||st==="has") e.classList.add("partial");
    e.innerHTML=`<span>${d}</span>`;
    if(data[key]&&data[key].length){
      e.classList.add("has");
      const dot=document.createElement("span");dot.className="dot";e.appendChild(dot);
      e.title=data[key].filter(t=>t.done).length+"/"+data[key].length;
      e.onclick=()=>jumpHistory(key);
    }
    grid.appendChild(e);
  }
}

/* ============ stats ============ */
function computeStreak(){
  let streak=0, d=new Date(todayKey()+"T12:00:00");
  const tk=todayKey();
  for(;;){
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const st=dayStatus(k);
    if(st==="all"){ streak++; d.setDate(d.getDate()-1); }
    else if(k===tk){ d.setDate(d.getDate()-1); } // today incomplete: don't break streak
    else break;
  }
  return streak;
}
function refreshAll(){
  renderCalendar(); renderHistory();
  const streak=computeStreak();
  document.getElementById("streakNum").textContent=streak;
  document.getElementById("stStreak").textContent=streak;
  let days=0,doneTasks=0;
  Object.keys(data).forEach(k=>{ if(data[k].length){days++;doneTasks+=data[k].filter(t=>t.done).length;} });
  document.getElementById("stDays").textContent=days;
  document.getElementById("stTasks").textContent=doneTasks;
}

/* ============ history ============ */
function renderHistory(){
  const wrap=document.getElementById("historyList");
  const keys=Object.keys(data).filter(k=>data[k].length).sort().reverse();
  wrap.innerHTML="";
  if(keys.length===0){ wrap.innerHTML='<div class="empty">'+L.emptyHistory+'</div>'; return; }
  const tk=todayKey();
  keys.forEach(k=>{
    const tasks=data[k]; const doneCnt=tasks.filter(t=>t.done).length;
    let tag="none",tagTxt=L.tagNone;
    if(doneCnt===tasks.length){tag="full";tagTxt=L.tagFull;}
    else if(doneCnt>0){tag="some";tagTxt=L.tagSome(doneCnt,tasks.length);}
    const el=document.createElement("div"); el.className="hday"; el.id="h-"+k;
    el.innerHTML=`<div class="hday-top"><span class="hday-date">${fmtDate(k,tk)}</span><span class="hday-tag ${tag}">${tagTxt}</span></div>`;
    tasks.forEach(t=>{
      const r=document.createElement("div"); r.className="htask"+(t.done?" ok":"");
      r.innerHTML=`<span>${t.done?"✅":"⬜"}</span><span></span>`;
      r.querySelector("span:last-child").textContent=t.title;
      el.appendChild(r);
    });
    wrap.appendChild(el);
  });
}
function fmtDate(k,tk){
  const [y,m,d]=k.split("-").map(Number);
  const wd=new Date(y,m-1,d).getDay();
  return L.fmtDate(m,d,wd,k===tk);
}
function jumpHistory(key){
  const el=document.getElementById("h-"+key);
  if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); el.style.outline="2px solid var(--accent)"; setTimeout(()=>el.style.outline="",1500); }
}

/* ============ toast + confetti ============ */
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
const cvs=document.getElementById("confetti"),ctx=cvs.getContext("2d");
let parts=[],rafOn=false;
function resize(){cvs.width=innerWidth;cvs.height=innerHeight;}
resize(); addEventListener("resize",resize);
function confetti(){
  const colors=["#7c5cff","#ff7ac6","#ffd166","#3ddc97","#ffffff"];
  for(let i=0;i<140;i++){
    parts.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-0.5)*12,vy:Math.random()*-10-4,g:0.3+Math.random()*0.2,size:5+Math.random()*7,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*6,vr:(Math.random()-0.5)*0.4,life:0});
  }
  if(!rafOn){rafOn=true;loop();}
}
function loop(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);ctx.restore();});
  parts=parts.filter(p=>p.y<cvs.height+30&&p.life<260);
  if(parts.length) requestAnimationFrame(loop); else {rafOn=false;ctx.clearRect(0,0,cvs.width,cvs.height);}
}

/* ============ settings UI ============ */
function buildTzSelect(){
  const sel=document.getElementById("tzSelect");
  sel.innerHTML="";
  TIMEZONES.forEach(([val,label])=>{
    const o=document.createElement("option");
    o.value=val; o.textContent= val==="auto"? L.tzAuto : label;
    if(val===settings.tz) o.selected=true;
    sel.appendChild(o);
  });
}
function syncLangSeg(){
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("active",b.dataset.lang===settings.lang));
}
function openSettings(){ buildTzSelect(); syncLangSeg(); document.getElementById("settingsOverlay").classList.add("show"); }
function closeSettings(){ document.getElementById("settingsOverlay").classList.remove("show"); }

/* ============ events ============ */
document.getElementById("addBtn").onclick=addTask;
document.getElementById("taskInput").addEventListener("keydown",e=>{if(e.key==="Enter")addTask();});
document.getElementById("prevMon").onclick=()=>{calDate.setMonth(calDate.getMonth()-1);renderCalendar();};
document.getElementById("nextMon").onclick=()=>{calDate.setMonth(calDate.getMonth()+1);renderCalendar();};
document.getElementById("todayBtn").onclick=()=>{calDate=new Date();renderCalendar();};
document.getElementById("clearBtn").onclick=()=>{ if(confirm(L.confirmClear)){data={};saveData();renderTasks();toast(L.toastCleared);} };

document.getElementById("gearBtn").onclick=openSettings;
document.getElementById("settingsClose").onclick=closeSettings;
document.getElementById("settingsOverlay").addEventListener("click",e=>{ if(e.target.id==="settingsOverlay") closeSettings(); });
document.querySelectorAll("#langSeg button").forEach(b=>b.onclick=()=>{
  settings.lang=b.dataset.lang; saveSettings(); syncLangSeg(); buildTzSelect(); applyLang(); tickCountdown();
});
document.getElementById("tzSelect").onchange=e=>{
  settings.tz=e.target.value; saveSettings(); calDate=new Date(); applyLang(); tickCountdown();
};

document.getElementById("motGo").onclick=()=>document.getElementById("motOverlay").classList.remove("show");
document.getElementById("motOverlay").addEventListener("click",e=>{ if(e.target.id==="motOverlay") e.currentTarget.classList.remove("show"); });

/* ============ init ============ */
applyLang();
tickCountdown();
setInterval(tickCountdown,1000);
</script>
</body>
